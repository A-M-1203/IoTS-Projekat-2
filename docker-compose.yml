services:
  postgres:
    image: postgres:16-alpine
    networks: [iot-net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-iot_agriculture}
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
    tmpfs:
      - /var/lib/postgresql/data
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iot} -d ${POSTGRES_DB:-iot_agriculture}"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    profiles: [mqtt]
    image: eclipse-mosquitto:2
    networks: [iot-net]
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    profiles: [kafka]
    image: apache/kafka:3.9.0
    networks: [iot-net]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  emqtt-bench:
    profiles: [mqtt]
    image: emqx/emqtt-bench:latest
    networks: [iot-net]
    environment:
      PATH: /emqtt_bench/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    entrypoint: ["sleep", "infinity"]
    depends_on:
      mosquitto:
        condition: service_healthy

  data-ingestion:
    profiles: [ingestion]
    build: ./services/data-ingestion
    networks: [iot-net]
    environment:
      BROKER_TYPE: ${BROKER_TYPE:-mqtt}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/agriculture/sensors}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot-agriculture-sensors}
      BATCH_SIZE: ${BATCH_SIZE:-20}
      BATCH_INTERVAL_SECONDS: ${BATCH_INTERVAL_SECONDS:-5}
      CSV_FILE_PATH: ${CSV_FILE_PATH:-/data/BIED_Smart_Agriculture_Dataset.csv}
    volumes:
      - ./BIED_Smart_Agriculture_Dataset.csv:/data/BIED_Smart_Agriculture_Dataset.csv:ro
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
        required: false
      kafka:
        condition: service_healthy
        required: false
    restart: on-failure

  data-storage:
    build: ./services/data-storage
    networks: [iot-net]
    ports:
      - "3000:3000"
    environment:
      BROKER_TYPE: ${BROKER_TYPE:-mqtt}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/agriculture/sensors}
      MQTT_SUBSCRIBE_QOS: ${MQTT_SUBSCRIBE_QOS:-2}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot-agriculture-sensors}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-data-storage-group}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-iot_agriculture}
      POSTGRES_USER: ${POSTGRES_USER:-iot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iot}
      STORAGE_BATCH_SIZE: ${STORAGE_BATCH_SIZE:-1}
      METRICS_PORT: ${STORAGE_METRICS_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
        required: false
      kafka:
        condition: service_healthy
        required: false
    restart: on-failure

  analytics:
    build: ./services/analytics
    networks: [iot-net]
    ports:
      - "8000:8000"
    environment:
      BROKER_TYPE: ${BROKER_TYPE:-mqtt}
      MQTT_HOST: ${MQTT_HOST:-mosquitto}
      MQTT_PORT: ${MQTT_PORT:-1883}
      MQTT_TOPIC: ${MQTT_TOPIC:-iot/agriculture/sensors}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-iot-agriculture-sensors}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-analytics-group}
      TEMP_ALERT_THRESHOLD: ${TEMP_ALERT_THRESHOLD:-50}
      WINDOW_SIZE_SECONDS: ${WINDOW_SIZE_SECONDS:-10}
      BENCHMARK_INSTANT_ALERT: ${BENCHMARK_INSTANT_ALERT:-false}
      BENCHMARK_ALERT_THRESHOLD: ${BENCHMARK_ALERT_THRESHOLD:-40}
    depends_on:
      mosquitto:
        condition: service_healthy
        required: false
      kafka:
        condition: service_healthy
        required: false
    restart: on-failure

networks:
  iot-net:
    name: iot-net
    driver: bridge
